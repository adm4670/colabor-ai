<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph - colabor-ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; overflow: hidden; }
        #mynetwork {
            width: 100%;
            height: calc(100vh - 64px);
            background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 100%);
            border: none;
        }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .glass-light {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        .node-tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 1000;
            max-width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
        }
        .node-tooltip .title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
        .node-tooltip .type { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .search-highlight {
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(99,102,241,0.3)); }
            50% { filter: drop-shadow(0 0 16px rgba(99,102,241,0.8)); }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>

    const filterGroups = [...new Set(graphData.nodes.map(n => n.group))];
    const filterContainer = document.getElementById("filter-buttons");
    const activeFilters = new Set(filterGroups);

    filterGroups.forEach(group => {
        const btn = document.createElement("button");
        btn.dataset.group = group;
        btn.className = "filter-btn text-xs px-3 py-1.5 rounded-lg font-medium transition-all flex items-center gap-2";
        btn.innerHTML = `<span class="w-2 h-2 rounded-full" style="background: ${getGroupColor(group)}"></span>${group}`;
        btn.classList.add("bg-indigo-500/20", "text-indigo-300", "border", "border-indigo-500/20");
        filterContainer.appendChild(btn);

        btn.addEventListener("click", () => {
            if (activeFilters.has(group)) {
                activeFilters.delete(group);
                btn.classList.remove("bg-indigo-500/20", "text-indigo-300", "border-indigo-500/20");
                btn.classList.add("bg-slate-800/50", "text-slate-500");
            } else {
                activeFilters.add(group);
                btn.classList.remove("bg-slate-800/50", "text-slate-500");
                btn.classList.add("bg-indigo-500/20", "text-indigo-300", "border", "border-indigo-500/20");
            }
            applyFilters();
        });
    });

    function getGroupColor(group) {
        const map = { agents: "#6366f1", tools: "#10b981", memory: "#f59e0b", core: "#06b6d4", deps: "#f43f5e", cloud: "#a855f7", directory: "#06b6d4", files: "#64748b" };
        return map[group] || "#64748b";
    }

    function applyFilters() {
        const idsToShow = new Set();
        graphData.nodes.forEach(n => {
            if (activeFilters.has(n.group)) idsToShow.add(n.id);
        });
        nodes.forEach(n => {
            const visible = idsToShow.has(n.id);
            nodes.update({ id: n.id, hidden: !visible });

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const q = searchInput.value.toLowerCase().trim();
            if (!q) {
                network.selectNodes([]);
                return;
            }
            const matches = graphData.nodes.filter(n => 
                n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q)
            );
            if (matches.length > 0) {
                const ids = matches.map(m => m.id);
                network.selectNodes(ids);
                network.fit({
                    nodes: ids,
                    animation: { duration: 800, easingFunction: "easeInOutQuad" }

            if (layout === "hierarchical") {

                const center = { x: 0, y: 0 };
                const groups = [...new Set(graphData.nodes.map(n => n.group))];
                const radius = 120;
                const positions = {};
                graphData.nodes.forEach((n, i) => {
                    const groupIdx = groups.indexOf(n.group);
                    const angle = (i / graphData.nodes.length) * 2 * Math.PI;
                    const r = radius + groupIdx * 40;
                    positions[n.id] = { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
                });
                nodes.forEach(n => {
                    if (positions[n.id]) {
                        nodes.update({ id: n.id, x: positions[n.id].x, y: positions[n.id].y });
                    }
                });
                network.fit({ animation: true });
            } else {
                network.setOptions({
                    physics: {
                        enabled: true,
                        solver: "forceAtlas2Based",
                        forceAtlas2Based: {
                            gravitationalConstant: -42,
                            centralGravity: 0.008,
                            springLength: 180,
                            springConstant: 0.05,
                            damping: 0.4,
                            avoidOverlap: 0.5,
                        },
                        stabilization: { iterations: 200 },
                    },
                    layout: { hierarchical: false }
                });
            }
        });
    });

    // ==================== RESET ====================
    document.getElementById("btn-reset").addEventListener("click", () => {
        network.fit({ animation: { duration: 600, easingFunction: "easeInOutQuad" } });
        network.selectNodes([]);
        searchInput.value = "";
    });

    // ==================== FULLSCREEN ====================
    document.getElementById("btn-fullscreen").addEventListener("click", () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    });

    // ==================== TOOLTIP ====================
    network.on("hoverNode", function (params) {
        const nodeId = params.node;
        const nodeData = graphData.nodes.find(n => n.id === nodeId);
        if (!nodeData) return;
        const tip = document.getElementById("tooltip");
        tip.style.display = "block";
        tip.innerHTML = `
            <div class="type">${nodeData.type}</div>
            <div class="title">${nodeData.label.replace(/\n/g, "<br>")}</div>
            <div class="text-xs text-slate-400 mt-1">ID: ${nodeData.id}</div>
        `;
        const rect = container.getBoundingClientRect();
        tip.style.left = (params.event.clientX - rect.left + 15) + "px";
        tip.style.top = (params.event.clientY - rect.top - 10) + "px";
    });

    network.on("blurNode", function () {
        document.getElementById("tooltip").style.display = "none";
    });

    // ==================== DOUBLE CLICK ====================
    network.on("doubleClick", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            network.fit({
                nodes: [nodeId],
                animation: { duration: 600, easingFunction: "easeInOutQuad" }
            });
        }
    });

    console.log("🚀 Knowledge Graph carregado:", graphData.nodes.length, "nós,", graphData.edges.length, "arestas");
    </script>
</body>
