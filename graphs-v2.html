<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph v2 - colabor-ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b1120; color: #e2e8f0; overflow: hidden; }
        #mynetwork {
            width: 100%;
            height: calc(100vh - 64px);
            background: radial-gradient(ellipse at center, #131c31 0%, #0b1120 100%);
            border: none;
            transition: width 0.3s ease;
        }
        #mynetwork.with-panel { width: calc(100% - 420px); }
        .glass {
            background: rgba(11, 17, 32, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .glass-light {
            background: rgba(19, 28, 49, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        /* Detail Panel */
        #detail-panel {
            position: fixed;
            top: 64px;
            right: -420px;
            width: 420px;
            height: calc(100vh - 64px);
            background: rgba(11, 17, 32, 0.97);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(148, 163, 184, 0.1);
            z-index: 50;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 0;
        }
        #detail-panel.open { right: 0; }
        #detail-panel::-webkit-scrollbar { width: 4px; }
        #detail-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .node-tooltip {
            position: absolute;
            background: rgba(11, 17, 32, 0.96);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 13px;
            pointer-events: none;
            z-index: 1000;
            max-width: 340px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .detail-section { padding: 16px 24px; border-bottom: 1px solid rgba(148,163,184,0.06); }
        .connection-item {
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(148,163,184,0.04);
            border: 1px solid rgba(148,163,184,0.06);
            margin-bottom: 4px;
            font-size: 13px;
            transition: all 0.15s;
        }
        .connection-item:hover { background: rgba(148,163,184,0.08); }
        .search-highlight { animation: pulse-glow 1.5s ease-in-out infinite; }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(99,102,241,0.3)); }
            50% { filter: drop-shadow(0 0 16px rgba(99,102,241,0.8)); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in { animation: slideIn 0.3s ease-out; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        @media (max-width: 768px) {
            #detail-panel { width: 100%; right: -100%; }
            #mynetwork.with-panel { width: 0; }
        }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="h-16 glass border-b border-white/5 flex items-center justify-between px-3 md:px-6 z-50 relative">
    <div class="flex items-center gap-2 md:gap-4">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-7 h-7 md:w-8 md:h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">KG</div>
            <div>
                <h1 class="text-white font-bold text-sm md:text-lg leading-tight">Knowledge Graph <span class="text-indigo-400 text-xs">v2</span></h1>
                <p class="text-[10px] md:text-xs text-slate-400"><span id="stats-nodes">0</span> nós · <span id="stats-edges">0</span> arestas · <span id="stats-groups">0</span> categorias</p>
            </div>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <div class="relative">
            <input id="search-input" type="text" placeholder="Buscar nó..." 
                class="w-36 md:w-56 bg-slate-800/80 text-xs md:text-sm text-white rounded-lg pl-8 pr-2.5 py-1.5 md:py-2 border border-white/10 focus:border-indigo-500/50 focus:outline-none focus:ring-1 focus:ring-indigo-500/20 transition-all placeholder:text-slate-500">
            <svg class="absolute left-2.5 top-2 md:top-2.5 w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <button id="btn-reset" class="text-slate-400 hover:text-white transition-colors p-1.5 md:p-2 rounded-lg hover:bg-slate-800/50" title="Resetar">
            <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
        <button id="btn-fullscreen" class="text-slate-400 hover:text-white transition-colors p-1.5 md:p-2 rounded-lg hover:bg-slate-800/50" title="Tela cheia">
            <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
        </button>
    </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip" class="node-tooltip"></div>

<!-- LEFTBAR: Filters + Layout -->
<div class="absolute left-2 md:left-4 top-20 z-40 flex flex-col gap-2 max-h-[70vh] overflow-y-auto">
    <div class="glass-light rounded-xl p-2.5 md:p-3 w-40 md:w-44 shadow-2xl">
        <p class="text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-semibold px-1">Filtrar tipo</p>
        <div id="filter-buttons" class="flex flex-col gap-1"></div>
    </div>
    <div class="glass-light rounded-xl p-2.5 md:p-3 w-40 md:w-44 shadow-2xl">
        <p class="text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-semibold px-1">Layout</p>
        <div class="flex flex-col gap-1">
            <button data-layout="force" class="layout-btn text-xs px-3 py-1.5 rounded-lg bg-indigo-500/20 text-indigo-300 border border-indigo-500/20 font-medium">Force Atlas</button>
            <button data-layout="hierarchical" class="layout-btn text-xs px-3 py-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 font-medium">Hierárquico</button>
            <button data-layout="concentric" class="layout-btn text-xs px-3 py-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 font-medium">Concêntrico</button>
        </div>
    </div>
</div>

<!-- NETWORK -->
<div id="mynetwork"></div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
    <div id="panel-content"></div>
</div>

<!-- LEGEND -->
<div class="absolute bottom-2 md:bottom-6 left-1/2 -translate-x-1/2 z-40 max-w-[95vw] overflow-x-auto">
    <div class="glass-light rounded-xl px-3 md:px-5 py-2 md:py-2.5 flex items-center gap-2 md:gap-5 shadow-2xl text-xs">
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-indigo-500"></div><span class="text-slate-400">Agents</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div><span class="text-slate-400">Tools</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-amber-500"></div><span class="text-slate-400">Memory</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-cyan-500"></div><span class="text-slate-400">Core</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-rose-500"></div><span class="text-slate-400">Deps</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-2.5 h-2.5 rounded-full bg-purple-500"></div><span class="text-slate-400">Cloud</span></div>
        <div class="flex items-center gap-1.5 shrink-0 border-l border-white/10 pl-3"><div class="w-3 h-0.5 bg-indigo-500/60"></div><span class="text-slate-400">contém</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-3 border-t border-dashed border-emerald-500/60"></div><span class="text-slate-400">usa</span></div>
        <div class="flex items-center gap-1.5 shrink-0"><div class="w-3 h-0.5 bg-amber-500/60"></div><span class="text-slate-400">coordena</span></div>
    </div>
</div>

// ==================== VIS NETWORK ====================
const nodes = new vis.DataSet(graphData.nodes.map(n => ({
    id: n.id,
    label: n.label,
    shape: n.shape || "dot",
    size: n.size || 15,
    color: { background: n.color, border: n.color, highlight: { background: n.color, border: "#ffffff" } },
    font: n.font || { color: "#e2e8f0", size: 11, face: "Inter" },
    borderWidth: 0, borderWidthSelected: 2,
    group: n.group,
    shadow: { enabled: true, color: n.color + "40", size: 6 },
})));

const edges = new vis.DataSet(graphData.edges.map(e => ({
    from: e.from, to: e.to, label: e.label,
    color: e.color || { color: "#334155", opacity: 0.4 },
    width: e.width || 1, dashes: e.dashes || false,
    smooth: { type: "curvedCW", roundness: 0.15 },
    font: { color: "#64748b", size: 9, face: "Inter", strokeWidth: 0, align: "middle" },
    arrows: { to: { enabled: true, scaleFactor: 0.6, type: "arrow" } },
})));

const container = document.getElementById("mynetwork");
const data = { nodes, edges };
const options = {
    physics: {
        solver: "forceAtlas2Based",
        forceAtlas2Based: { gravitationalConstant: -42, centralGravity: 0.008, springLength: 180, springConstant: 0.05, damping: 0.4, avoidOverlap: 0.5 },
        stabilization: { iterations: 200 },
    },
    interaction: { hover: true, tooltipDelay: 200, navigationButtons: true, keyboard: true, multiselect: true, selectConnectedEdges: true },
    manipulation: { enabled: false },
    edges: { smooth: { type: "curvedCW", roundness: 0.15 }, arrowStrikethrough: false },
    nodes: { borderWidth: 0, borderWidthSelected: 2 },
    groups: { agents: { shape: "hexagon", size: 22 }, tools: { shape: "dot", size: 18 }, memory: { shape: "diamond", size: 16 }, core: { shape: "square", size: 14 }, deps: { shape: "star", size: 12 }, cloud: { shape: "dot", size: 16 } },
};
const network = new vis.Network(container, data, options);

document.getElementById("stats-nodes").textContent = graphData.nodes.length;
document.getElementById("stats-edges").textContent = graphData.edges.length;
document.getElementById("stats-groups").textContent = [...new Set(graphData.nodes.map(n=>n.group))].length;

function closePanel() {
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("mynetwork").classList.remove("with-panel");
}

function focusNode(nodeId) {
    closePanel();
    network.fit({ nodes: [nodeId], animation: { duration: 500, easingFunction: "easeInOutQuad" } });
    network.selectNodes([nodeId]);
    setTimeout(() => showNodeDetails(nodeId), 600);
}

// ==================== FILTERS ====================
const filterGroups = [...new Set(graphData.nodes.map(n => n.group))];
const filterContainer = document.getElementById("filter-buttons");
const activeFilters = new Set(filterGroups);

filterGroups.forEach(group => {
    const btn = document.createElement("button");
    btn.dataset.group = group;
    btn.className = "filter-btn text-xs px-3 py-1.5 rounded-lg font-medium transition-all flex items-center gap-2";
    const colors = { agents: "#6366f1", tools: "#10b981", memory: "#f59e0b", core: "#06b6d4", deps: "#f43f5e", cloud: "#a855f7", files: "#64748b" };
    btn.innerHTML = `<span class="w-2 h-2 rounded-full shrink-0" style="background:${colors[group]||'#64748b'}"></span><span class="truncate">${group}</span>`;
    btn.classList.add("bg-indigo-500/20", "text-indigo-300", "border", "border-indigo-500/20");
    filterContainer.appendChild(btn);

    btn.addEventListener("click", () => {
        if (activeFilters.has(group)) {
            activeFilters.delete(group);
            btn.classList.remove("bg-indigo-500/20", "text-indigo-300", "border-indigo-500/20");
            btn.classList.add("bg-slate-800/50", "text-slate-500");
        } else {
            activeFilters.add(group);
            btn.classList.remove("bg-slate-800/50", "text-slate-500");
            btn.classList.add("bg-indigo-500/20", "text-indigo-300", "border", "border-indigo-500/20");
        }
        applyFilters();
    });
});

function applyFilters() {
    const idsToShow = new Set();
    graphData.nodes.forEach(n => { if (activeFilters.has(n.group)) idsToShow.add(n.id); });
    nodes.forEach(n => { nodes.update({ id: n.id, hidden: !idsToShow.has(n.id) }); });
}

// ==================== SEARCH ====================
const searchInput = document.getElementById("search-input");
let searchTimeout;
searchInput.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const q = searchInput.value.toLowerCase().trim();
        if (!q) { network.selectNodes([]); return; }
        const matches = graphData.nodes.filter(n => n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q));
        if (matches.length > 0) {
            const ids = matches.map(m => m.id);
            network.selectNodes(ids);
            network.fit({ nodes: ids, animation: { duration: 800, easingFunction: "easeInOutQuad" } });
        }
    }, 300);
});

// ==================== LAYOUT ====================
document.querySelectorAll(".layout-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".layout-btn").forEach(b => {
            b.classList.remove("bg-indigo-500/20", "text-indigo-300", "border-indigo-500/20");
            b.classList.add("text-slate-400");
        });
        btn.classList.add("bg-indigo-500/20", "text-indigo-300", "border", "border-indigo-500/20");
        btn.classList.remove("text-slate-400");

        const layout = btn.dataset.layout;
        if (layout === "hierarchical") {
            network.setOptions({ physics: { enabled: false }, layout: { hierarchical: { direction: "UD", sortMethod: "directed", levelSeparation: 180, nodeSpacing: 150, treeSpacing: 200, edgeMinimization: true } } });
        } else if (layout === "concentric") {
            network.setOptions({ physics: { enabled: false }, layout: { hierarchical: false } });
            const groups = [...new Set(graphData.nodes.map(n => n.group))];
            const positions = {};
            graphData.nodes.forEach((n, i) => {
                const groupIdx = groups.indexOf(n.group);
                const angle = (i / graphData.nodes.length) * 2 * Math.PI;
                const r = 120 + groupIdx * 40;
                positions[n.id] = { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
            });
            nodes.forEach(n => { if (positions[n.id]) nodes.update({ id: n.id, x: positions[n.id].x, y: positions[n.id].y }); });
            network.fit({ animation: true });
        } else {
            network.setOptions({ physics: { enabled: true, solver: "forceAtlas2Based", forceAtlas2Based: { gravitationalConstant: -42, centralGravity: 0.008, springLength: 180, springConstant: 0.05, damping: 0.4, avoidOverlap: 0.5 }, stabilization: { iterations: 200 } }, layout: { hierarchical: false } });
        }
    });
});

    tip.innerHTML = `
        <div class="text-[10px] uppercase tracking-wider opacity-50 mb-1">${nodeData.type || nodeData.group || "component"}</div>
        <div class="text-white font-bold text-sm">${nodeData.label.replace(/\n/g, "<br>")}</div>
        <div class="text-xs text-slate-400 mt-1">${(details?.description || "Sem descrição").substring(0, 100)}${(details?.description||"").length > 100 ? "..." : ""}</div>
        <div class="text-[10px] text-slate-600 mt-1 font-mono">${details?.path || nodeData.id}</div>
    `;
    const rect = container.getBoundingClientRect();
    tip.style.left = (params.event.clientX - rect.left + 15) + "px";
    tip.style.top = (params.event.clientY - rect.top - 10) + "px";
});

network.on("blurNode", function() {
    document.getElementById("tooltip").style.display = "none";
});

// ==================== DOUBLE CLICK ====================
network.on("doubleClick", function(params) {
    if (params.nodes.length > 0) {
        showNodeDetails(params.nodes[0]);
        network.fit({ nodes: [params.nodes[0]], animation: { duration: 600, easingFunction: "easeInOutQuad" } });
    }
});

// ==================== ESC TO CLOSE PANEL ====================
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closePanel();
});

console.log("🚀 Knowledge Graph v2 carregado:", graphData.nodes.length, "nós,", graphData.edges.length, "arestas");
</script>
</body>
