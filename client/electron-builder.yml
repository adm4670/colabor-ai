appId: com.colabor-ai.client
    productName: colabor-ai
    directories:
      output: release
      buildResources: build
    files:
      - dist/**/*
      - dist-electron/**/*
    win:
      target:
        - nsis
        - portable
      icon: build/icon.ico
      artifactName: "${productName}-${version}-setup.${ext}"
    nsis:
      oneClick: false
      allowToChangeInstallationDirectory: true
      createDesktopShortcut: true
    portable:
      artifactName: "${productName}-${version}-portable.${ext}"
    extraResources:
      - from: "../cloud/dist"
        to: "cloud-backend"
    